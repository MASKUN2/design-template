openapi: 3.1.0
info:
  title: "Quill API"
  version: 0.1.0
  description: "HTTP contract for Quill."
servers:
  - url: http://localhost:PORT
    description: Local development

tags:
  - name: posts

security: []

paths:
  /posts:
    get:
      tags: [posts]
      summary: List posts
      operationId: listPosts
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }
    post:
      tags: [posts]
      summary: Create a post
      operationId: createPost
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePost" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /posts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [posts]
      summary: Get one post
      operationId: getPost
      responses:
        "200":
          description: The post
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [posts]
      summary: Update a post
      operationId: updatePost
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePost" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [posts]
      summary: Delete a post
      operationId: deletePost
      security:
        - bearerAuth: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Validation error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode: { type: integer, example: 404 }
        message:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        error: { type: string }

    Post:
      type: object
      required: [id, slug, title, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        slug: { type: string }
        title: { type: string }
        status: { type: string, enum: [DRAFT, PUBLISHED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreatePost:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        slug: { type: string }
        status: { type: string, enum: [DRAFT, PUBLISHED] }
