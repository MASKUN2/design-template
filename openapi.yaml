openapi: 3.1.0
info:
  title: "{{PROJECT_NAME}} API"
  version: 0.1.0
  description: >
    HTTP contract for {{PROJECT_NAME}}. TODO(agent): describe the API, its auth
    model, and any global conventions (prefix, validation, error shape).
servers:
  - url: http://localhost:PORT
    description: Local development

tags:
  - name: items
    description: "EXAMPLE resource — replace with your own."

# TODO(agent): define auth. Example bearer scheme is declared in components.
security: []

paths:
  # ----- EXAMPLE resource (/items). Replace or delete. --------------------- #
  /items:
    get:
      tags: [items]
      summary: List items
      operationId: listItems
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Item" }
    post:
      tags: [items]
      summary: Create an item
      operationId: createItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateItem" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [items]
      summary: Get one item
      operationId: getItem
      responses:
        "200":
          description: The item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [items]
      summary: Update an item
      operationId: updateItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateItem" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [items]
      summary: Delete an item
      operationId: deleteItem
      security:
        - bearerAuth: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "TODO(agent): describe the token."

  responses:
    BadRequest:
      description: Validation error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode: { type: integer, example: 404 }
        message:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        error: { type: string }

    # One component schema per aggregate root (validate.py checks this).
    Item:
      type: object
      required: [id, slug, title, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        slug: { type: string }
        title: { type: string }
        status: { type: string, enum: [DRAFT, PUBLISHED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateItem:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        slug: { type: string }
        status: { type: string, enum: [DRAFT, PUBLISHED] }
